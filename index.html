<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Mapa de Viagens</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet.markercluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a212b;
      --panel-2: #232c38;
      --text: #e6edf3;
      --muted: #8b97a7;
      --accent: #4fa3ff;
      --accent-soft: rgba(79, 163, 255, 0.18);
      --visited: #4fa3ff;
      --danger: #ff6b6b;
      --border: #2a3441;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ---------- Sidebar ---------- */
    #sidebar {
      width: 340px;
      min-width: 340px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .brand {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .brand h1 {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .brand p { color: var(--muted); font-size: 12.5px; margin-top: 4px; }

    .search {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .search-row { display: flex; gap: 8px; position: relative; }

    /* ---------- Autocomplete dropdown ---------- */
    #suggest {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,.45);
      overflow: hidden;
      z-index: 1000;
      display: none;
    }
    #suggest.open { display: block; }
    .sug {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .sug:last-child { border-bottom: none; }
    .sug:hover, .sug.active { background: var(--accent-soft); }
    .sug .flag { font-size: 18px; line-height: 1; }
    .sug .txt { flex: 1; min-width: 0; }
    .sug .t1 { font-size: 13.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sug .t2 { font-size: 11.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sug-info { padding: 11px 12px; font-size: 12.5px; color: var(--muted); }
    #cityInput {
      flex: 1;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 13px;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    #cityInput:focus { border-color: var(--accent); }
    #cityInput::placeholder { color: var(--muted); }
    #addBtn {
      background: var(--accent);
      color: #04111f;
      border: none;
      border-radius: 10px;
      padding: 0 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: filter .15s;
    }
    #addBtn:hover { filter: brightness(1.08); }
    #addBtn:disabled { opacity: .5; cursor: wait; }
    .hint { color: var(--muted); font-size: 11.5px; margin-top: 9px; line-height: 1.5; }
    #status { font-size: 12.5px; margin-top: 9px; min-height: 16px; }
    .status-err { color: var(--danger); }
    .status-ok { color: var(--accent); }

    .stats {
      display: flex;
      padding: 14px 20px;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .stat {
      flex: 1;
      background: var(--panel-2);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .stat .num { font-size: 24px; font-weight: 700; color: var(--accent); }
    .stat .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }

    .list-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px 8px;
    }
    .list-head span { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    #clearBtn {
      background: none; border: none; color: var(--muted);
      font-size: 12px; cursor: pointer; text-decoration: underline;
    }
    #clearBtn:hover { color: var(--danger); }

    #list { flex: 1; overflow-y: auto; padding: 0 12px 16px; }
    .place {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: background .12s;
    }
    .place:hover { background: var(--panel-2); }
    .place .flag { font-size: 20px; line-height: 1; }
    .place .info { flex: 1; min-width: 0; }
    .place .city { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .place .country { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .place .del {
      opacity: 0;
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 17px; padding: 2px 6px; border-radius: 6px;
      transition: opacity .12s, color .12s, background .12s;
    }
    .place:hover .del { opacity: 1; }
    .place .del:hover { color: var(--danger); background: rgba(255,107,107,.12); }
    .empty { color: var(--muted); font-size: 13px; text-align: center; padding: 30px 20px; line-height: 1.6; }

    /* ---------- Map ---------- */
    #map { flex: 1; height: 100%; background: #0b1117; }

    .leaflet-popup-content-wrapper { background: var(--panel); color: var(--text); border-radius: 10px; }
    .leaflet-popup-tip { background: var(--panel); }
    .leaflet-popup-content { margin: 12px 14px; font-size: 13px; }
    .leaflet-popup-content b { font-size: 14px; }
    .leaflet-container a.leaflet-popup-close-button { color: var(--muted); }

    .pin-icon {
      width: 16px; height: 16px;
      background: var(--accent);
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 0 0 2px var(--accent), 0 2px 6px rgba(0,0,0,.5);
    }
    .flag-pin {
      position: relative;
      width: 20px; height: 20px;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      background-color: #fff;
      cursor: pointer;
    }
    .flag-pin.major { width: 24px; height: 24px; }
    .cluster-flag {
      position: relative;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      background-color: #fff;
      cursor: pointer;
    }
    .cluster-badge {
      position: absolute;
      bottom: -4px; right: -4px;
      min-width: 16px; height: 16px;
      padding: 0 4px;
      display: flex; align-items: center; justify-content: center;
      background: #04111f;
      color: #fff;
      border: 1.5px solid #fff;
      border-radius: 9px;
      font-size: 10px; font-weight: 700; line-height: 1;
    }
    .flag-pin .star {
      position: absolute;
      top: -7px; right: -7px;
      font-size: 11px;
      line-height: 1;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,.6));
      pointer-events: none;
    }

    @media (max-width: 720px) {
      body { flex-direction: column; }
      #sidebar { width: 100%; min-width: 0; height: 45%; }
      #map { height: 55%; }
    }
  </style>
</head>
<body>
  <aside id="sidebar">
    <div class="brand">
      <h1>🌍 Meu Mapa de Viagens</h1>
      <p>Pins nas cidades, cores nos países visitados.</p>
    </div>

    <div class="search">
      <div class="search-row">
        <input id="cityInput" type="text" placeholder="Cidade (ex: Tóquio, Lisboa...)" autocomplete="off" />
        <button id="addBtn">Adicionar</button>
        <div id="suggest"></div>
      </div>
      <div class="hint">Digite uma cidade e Enter. Ou clique duas vezes no mapa para marcar um ponto.</div>
      <div id="status"></div>
    </div>

    <div class="stats">
      <div class="stat"><div class="num" id="statCities">0</div><div class="lbl">Cidades</div></div>
      <div class="stat"><div class="num" id="statCountries">0</div><div class="lbl">Países</div></div>
    </div>

    <div class="list-head">
      <span>Lugares visitados</span>
      <button id="clearBtn">limpar tudo</button>
    </div>
    <div id="list"></div>
  </aside>

  <div id="map"></div>

  <script>
  (function () {
    "use strict";

    const STORAGE_KEY = "travel-map-places-v1";
    const SEED_KEY = "travel-map-seeded-v1";
    const COUNTRY_GEOJSON =
      "https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson";

    // Lugares pré-cadastrados (rodam uma única vez, sem apagar os seus).
    const SEED = [
      // Brasil (BR)
      ["Vitória", "Brasil", "BR", -20.3155, -40.3128],
      ["São Paulo", "Brasil", "BR", -23.5505, -46.6333],
      ["Rio de Janeiro", "Brasil", "BR", -22.9068, -43.1729],
      ["Goiânia", "Brasil", "BR", -16.6869, -49.2648],
      ["Recife", "Brasil", "BR", -8.0476, -34.8770],
      ["Foz do Iguaçu", "Brasil", "BR", -25.5163, -54.5854],
      ["Porto Alegre", "Brasil", "BR", -30.0346, -51.2177],
      ["Gramado", "Brasil", "BR", -29.3789, -50.8740],
      ["São João del Rei", "Brasil", "BR", -21.1359, -44.2619],
      ["Belo Horizonte", "Brasil", "BR", -19.9167, -43.9345],
      ["Ouro Preto", "Brasil", "BR", -20.3856, -43.5035],
      ["Cumuruxatiba", "Brasil", "BR", -17.0954, -39.1880],
      ["Guarapari", "Brasil", "BR", -20.6717, -40.4969],
      ["Pedra Azul (ES)", "Brasil", "BR", -20.4119, -41.0186],
      ["Petrópolis", "Brasil", "BR", -22.5050, -43.1786],
      // Argentina (AR)
      ["Bariloche", "Argentina", "AR", -41.1335, -71.3103],
      ["Puerto Iguazú", "Argentina", "AR", -25.5990, -54.5735],
      // Paraguai (PY)
      ["Ciudad del Este", "Paraguai", "PY", -25.5095, -54.6111],
      // EUA (US)
      ["Miami", "Estados Unidos", "US", 25.7617, -80.1918],
      ["Key West", "Estados Unidos", "US", 24.5551, -81.7800],
      ["Orlando", "Estados Unidos", "US", 28.5383, -81.3792],
      ["São Francisco", "Estados Unidos", "US", 37.7749, -122.4194],
      ["Los Angeles", "Estados Unidos", "US", 34.0522, -118.2437],
      ["Las Vegas", "Estados Unidos", "US", 36.1699, -115.1398],
      ["Solvang", "Estados Unidos", "US", 34.5958, -120.1377],
      ["Monterey", "Estados Unidos", "US", 36.6002, -121.8947],
      ["Napa Valley", "Estados Unidos", "US", 38.2975, -122.2869],
      ["Mount Charleston", "Estados Unidos", "US", 36.2716, -115.6953],
      // Espanha (ES)
      ["Barcelona", "Espanha", "ES", 41.3851, 2.1734],
      ["Valência", "Espanha", "ES", 39.4699, -0.3763],
      ["Madri", "Espanha", "ES", 40.4168, -3.7038],
      ["Girona", "Espanha", "ES", 41.9794, 2.8214],
      ["Montserrat", "Espanha", "ES", 41.5938, 1.8376],
      ["Peñíscola", "Espanha", "ES", 40.3580, 0.4070],
      // Andorra (AD)
      ["Andorra la Vella", "Andorra", "AD", 42.5063, 1.5218],
      // França (FR)
      ["Paris", "França", "FR", 48.8566, 2.3522],
      ["Nice", "França", "FR", 43.7102, 7.2620],
      ["Menton", "França", "FR", 43.7765, 7.5000],
      ["Cannes", "França", "FR", 43.5528, 7.0174],
      // Mônaco (MC)
      ["Mônaco", "Mônaco", "MC", 43.7384, 7.4246],
      // Itália (IT)
      ["San Remo", "Itália", "IT", 43.8159, 7.7762],
      ["Ventimiglia", "Itália", "IT", 43.7906, 7.6076],
      // Reino Unido (GB)
      ["Londres", "Reino Unido", "GB", 51.5074, -0.1278],
      ["Cambridge", "Reino Unido", "GB", 52.2053, 0.1218],
      // Alemanha (DE)
      ["Munique", "Alemanha", "DE", 48.1351, 11.5820],
      // Áustria (AT)
      ["Salzburg", "Áustria", "AT", 47.8095, 13.0550],
    ];

    // Grandes centros turísticos -> pin especial (maior, anel dourado e estrela).
    const MAJOR = new Set([
      "Rio de Janeiro", "São Paulo", "Foz do Iguaçu",
      "Miami", "Orlando", "Los Angeles", "Las Vegas", "São Francisco",
      "Barcelona", "Madri", "Paris", "Nice", "Cannes", "Mônaco",
      "Londres", "Munique", "Salzburg",
    ]);

    let places = load();
    maybeSeed();
    let countryLayer = null;
    const markers = new Map(); // id -> L.marker

    // ---------- Map ----------
    const map = L.map("map", { worldCopyJump: true, minZoom: 2, doubleClickZoom: false }).setView([20, 10], 2);

    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      subdomains: "abcd",
      maxZoom: 19,
    }).addTo(map);

    // Um grupo de cluster por país -> só junta bolinhas do mesmo país,
    // e a bolha do cluster mantém a bandeira daquele país.
    const clusters = new Map(); // iso2 -> L.markerClusterGroup

    function clusterFor(iso2) {
      const key = iso2 || "_";
      if (clusters.has(key)) return clusters.get(key);
      const iso = iso2.toLowerCase();
      const ring = colorForCountry(iso2 || "");
      const g = L.markerClusterGroup({
        showCoverageOnHover: false,
        spiderfyOnMaxZoom: true,
        maxClusterRadius: 22,
        iconCreateFunction: function (cl) {
          const count = cl.getChildCount();
          const size = count < 5 ? 30 : count < 12 ? 38 : 46;
          const bg = iso
            ? "background-image:url(https://flagcdn.com/w80/" + iso + ".png);"
            : "background:#4fa3ff;";
          return L.divIcon({
            className: "",
            html: '<div class="cluster-flag" data-c="' + iso + '" style="width:' + size + "px;height:" + size + "px;" + bg +
              "box-shadow:0 0 0 2px " + ring + ',0 1px 5px rgba(0,0,0,.5)">' +
              '<span class="cluster-badge">' + count + "</span></div>",
            iconSize: [size, size],
            iconAnchor: [size / 2, size / 2],
          });
        },
      });
      g.on("animationend", spread);
      map.addLayer(g);
      clusters.set(key, g);
      return g;
    }

    // Lê a posição (px) que o Leaflet aplicou no ícone externo.
    function iconXY(el) {
      const m = /translate3d\(\s*([-\d.]+)px,\s*([-\d.]+)px/.exec(el.style.transform || "");
      return m ? { x: +m[1], y: +m[2] } : null;
    }

    // Declutter REAL: afasta ícones que se sobrepõem, mas só entre países DIFERENTES.
    // (mesmo país já é resolvido pelo cluster.)
    function spread() {
      const pane = map.getPane("markerPane");
      if (!pane) return;
      const items = [];
      pane.querySelectorAll(".leaflet-marker-icon").forEach((el) => {
        const inner = el.firstElementChild;
        if (!inner) return;
        const country = inner.getAttribute("data-c");
        if (country == null) return; // ícone sem país (fallback) -> ignora
        const pos = iconXY(el);
        if (!pos) return;
        inner.style.transform = ""; // zera deslocamento anterior
        items.push({ country, inner, x: pos.x, y: pos.y, r: (inner.offsetWidth || 20) / 2, ox: 0, oy: 0 });
      });

      for (let iter = 0; iter < 30; iter++) {
        let moved = false;
        for (let i = 0; i < items.length; i++) {
          for (let j = i + 1; j < items.length; j++) {
            const a = items[i], b = items[j];
            if (a.country === b.country) continue; // mesmo país: deixa o cluster cuidar
            let dx = (b.x + b.ox) - (a.x + a.ox);
            let dy = (b.y + b.oy) - (a.y + a.oy);
            let d = Math.hypot(dx, dy);
            const min = a.r + b.r + 3;
            if (d < min) {
              if (d < 0.01) { dx = Math.cos(i + j); dy = Math.sin(i + j); d = 1; }
              const ux = dx / d, uy = dy / d, push = (min - d) / 2;
              a.ox -= ux * push; a.oy -= uy * push;
              b.ox += ux * push; b.oy += uy * push;
              moved = true;
            }
          }
        }
        if (!moved) break;
      }

      items.forEach((it) => {
        if (it.ox || it.oy) it.inner.style.transform = "translate(" + it.ox.toFixed(1) + "px," + it.oy.toFixed(1) + "px)";
      });
    }

    map.on("zoomend moveend", spread);

    // Country polygons (light fill on visited)
    fetch(COUNTRY_GEOJSON)
      .then((r) => r.json())
      .then((geo) => {
        countryLayer = L.geoJSON(geo, {
          style: styleCountry,
          onEachFeature: (f, layer) => {
            layer.on("click", () => {
              // clicking a country does nothing destructive; just informative
            });
          },
        }).addTo(map);
        countryLayer.bringToBack();
        refreshCountryColors();
      })
      .catch(() => setStatus("Não consegui carregar os contornos dos países (sem internet?).", "err"));

    function visitedISO2() {
      const set = new Set();
      places.forEach((p) => { if (p.iso2) set.add(p.iso2.toUpperCase()); });
      return set;
    }

    function featureISO2(f) {
      const pr = f.properties || {};
      let c = pr.ISO_A2_EH || pr.ISO_A2 || pr.iso_a2 || "";
      if (!c || c === "-99") c = "";
      return c.toUpperCase();
    }

    function styleCountry(f) {
      const iso = featureISO2(f);
      if (!visitedISO2().has(iso)) {
        return { fillColor: "#000", fillOpacity: 0, color: "#2a3441", weight: 0.5, opacity: 0.4 };
      }
      const c = colorForCountry(iso);
      return { fillColor: c, fillOpacity: 0.18, color: c, weight: 0.8, opacity: 0.45 };
    }

    function refreshCountryColors() {
      if (!countryLayer) return;
      countryLayer.setStyle(styleCountry);
      applyFlagFills();
    }

    const SVG_NS = "http://www.w3.org/2000/svg";

    // Cria (uma vez) o <pattern> com a bandeira do país dentro do SVG do mapa.
    function ensureFlagPattern(svg, iso) {
      const id = "flagpat-" + iso;
      if (!svg || svg.querySelector("#" + id)) return id;
      let defs = svg.querySelector("defs");
      if (!defs) { defs = document.createElementNS(SVG_NS, "defs"); svg.insertBefore(defs, svg.firstChild); }
      const pat = document.createElementNS(SVG_NS, "pattern");
      pat.setAttribute("id", id);
      pat.setAttribute("patternContentUnits", "objectBoundingBox");
      pat.setAttribute("width", "1");
      pat.setAttribute("height", "1");
      const img = document.createElementNS(SVG_NS, "image");
      const url = "https://flagcdn.com/w160/" + iso + ".png";
      img.setAttributeNS("http://www.w3.org/1999/xlink", "href", url);
      img.setAttribute("href", url);
      img.setAttribute("width", "1");
      img.setAttribute("height", "1");
      img.setAttribute("preserveAspectRatio", "xMidYMid slice");
      pat.appendChild(img);
      defs.appendChild(pat);
      return id;
    }

    // Preenche cada país visitado com a sua bandeira, bem suave.
    function applyFlagFills() {
      if (!countryLayer) return;
      countryLayer.eachLayer((layer) => {
        const path = layer._path;
        if (!path || !path.ownerSVGElement) return;
        const iso = featureISO2(layer.feature).toLowerCase();
        if (iso && visitedISO2().has(iso.toUpperCase())) {
          const id = ensureFlagPattern(path.ownerSVGElement, iso);
          path.setAttribute("fill", "url(#" + id + ")");
          path.setAttribute("fill-opacity", "0.16");
        } else {
          path.setAttribute("fill-opacity", "0");
        }
      });
    }

    // ---------- Add a place ----------
    const input = document.getElementById("cityInput");
    const addBtn = document.getElementById("addBtn");
    const suggestEl = document.getElementById("suggest");

    let suggestions = [];   // current dropdown results (raw Nominatim hits)
    let activeIdx = -1;     // highlighted suggestion
    let debounceTimer = null;
    let searchSeq = 0;      // guards against out-of-order responses

    input.addEventListener("input", () => {
      const q = input.value.trim();
      activeIdx = -1;
      clearTimeout(debounceTimer);
      if (q.length < 2) { closeSuggest(); return; }
      debounceTimer = setTimeout(() => fetchSuggestions(q), 280);
    });

    input.addEventListener("keydown", (e) => {
      const open = suggestEl.classList.contains("open") && suggestions.length;
      if (e.key === "ArrowDown" && open) {
        e.preventDefault();
        activeIdx = (activeIdx + 1) % suggestions.length;
        renderSuggestions();
      } else if (e.key === "ArrowUp" && open) {
        e.preventDefault();
        activeIdx = (activeIdx - 1 + suggestions.length) % suggestions.length;
        renderSuggestions();
      } else if (e.key === "Enter") {
        e.preventDefault();
        if (open) chooseSuggestion(activeIdx >= 0 ? activeIdx : 0);
        else addFromInput();
      } else if (e.key === "Escape") {
        closeSuggest();
      }
    });

    addBtn.addEventListener("click", () => {
      if (suggestions.length) chooseSuggestion(activeIdx >= 0 ? activeIdx : 0);
      else addFromInput();
    });

    document.addEventListener("click", (e) => {
      if (!e.target.closest(".search")) closeSuggest();
    });

    map.on("dblclick", (e) => reverseGeocode(e.latlng.lat, e.latlng.lng));

    async function fetchSuggestions(q) {
      const seq = ++searchSeq;
      suggestEl.classList.add("open");
      suggestEl.innerHTML = '<div class="sug-info">Buscando…</div>';
      try {
        const url =
          "https://nominatim.openstreetmap.org/search?format=jsonv2&limit=6&addressdetails=1&q=" +
          encodeURIComponent(q);
        const res = await fetch(url, { headers: { "Accept-Language": "pt-BR" } });
        const data = await res.json();
        if (seq !== searchSeq) return; // a newer search already fired
        suggestions = data;
        renderSuggestions();
      } catch (err) {
        if (seq !== searchSeq) return;
        suggestEl.innerHTML = '<div class="sug-info">Erro na busca. Verifique a internet.</div>';
      }
    }

    function renderSuggestions() {
      if (!suggestions.length) {
        suggestEl.innerHTML = '<div class="sug-info">Nenhum resultado.</div>';
        suggestEl.classList.add("open");
        return;
      }
      suggestEl.innerHTML = "";
      suggestions.forEach((hit, i) => {
        const addr = hit.address || {};
        const name =
          addr.city || addr.town || addr.village || addr.municipality ||
          addr.county || addr.state ||
          (hit.display_name ? hit.display_name.split(",")[0] : "Local");
        const rest = (hit.display_name || "")
          .split(",").slice(1).map((s) => s.trim()).filter(Boolean).join(", ");
        const flag = isoToFlag((addr.country_code || "").toUpperCase());
        const el = document.createElement("div");
        el.className = "sug" + (i === activeIdx ? " active" : "");
        el.innerHTML =
          '<div class="flag">' + (flag || "📍") + "</div>" +
          '<div class="txt"><div class="t1">' + escapeHtml(name) + "</div>" +
          '<div class="t2">' + escapeHtml(rest) + "</div></div>";
        el.addEventListener("mouseenter", () => { activeIdx = i; renderSuggestions(); });
        el.addEventListener("click", () => chooseSuggestion(i));
        suggestEl.appendChild(el);
      });
      suggestEl.classList.add("open");
    }

    function chooseSuggestion(i) {
      const hit = suggestions[i];
      if (!hit) return;
      const place = buildPlace(hit, input.value.trim());
      commitPlace(place);
      input.value = "";
      closeSuggest();
      setStatus("Adicionado: " + place.city, "ok");
    }

    function closeSuggest() {
      suggestEl.classList.remove("open");
      suggestEl.innerHTML = "";
      suggestions = [];
      activeIdx = -1;
    }

    async function addFromInput() {
      const q = input.value.trim();
      if (!q) return;
      addBtn.disabled = true;
      setStatus("Buscando…", "");
      try {
        const url =
          "https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&addressdetails=1&q=" +
          encodeURIComponent(q);
        const res = await fetch(url, { headers: { "Accept-Language": "pt-BR" } });
        const data = await res.json();
        if (!data.length) { setStatus("Cidade não encontrada. Tenta de outro jeito.", "err"); return; }
        const place = buildPlace(data[0], q);
        commitPlace(place);
        input.value = "";
        setStatus("Adicionado: " + place.city, "ok");
      } catch (err) {
        setStatus("Erro na busca. Verifique a internet.", "err");
      } finally {
        addBtn.disabled = false;
      }
    }

    async function reverseGeocode(lat, lon) {
      setStatus("Identificando local…", "");
      try {
        const url =
          "https://nominatim.openstreetmap.org/reverse?format=jsonv2&addressdetails=1&zoom=10&lat=" +
          lat + "&lon=" + lon;
        const res = await fetch(url, { headers: { "Accept-Language": "pt-BR" } });
        const hit = await res.json();
        if (!hit || hit.error) { setStatus("Não consegui identificar esse ponto.", "err"); return; }
        const place = buildPlace(hit, null, lat, lon);
        commitPlace(place);
        setStatus("Adicionado: " + place.city, "ok");
      } catch (err) {
        setStatus("Erro ao identificar o ponto.", "err");
      }
    }

    function buildPlace(hit, fallbackName, lat, lon) {
      const addr = hit.address || {};
      const city =
        addr.city || addr.town || addr.village || addr.municipality ||
        addr.county || addr.state || fallbackName ||
        (hit.display_name ? hit.display_name.split(",")[0] : "Local");
      return {
        id: "p_" + Date.now() + "_" + Math.floor(Math.random() * 1e6),
        city: city,
        country: addr.country || "",
        iso2: (addr.country_code || "").toUpperCase(),
        lat: lat != null ? lat : parseFloat(hit.lat),
        lon: lon != null ? lon : parseFloat(hit.lon),
      };
    }

    function commitPlace(place) {
      // avoid exact duplicates (same city+country)
      const dup = places.find(
        (p) => p.city === place.city && p.country === place.country
      );
      if (dup) { focusPlace(dup.id); return; }
      places.push(place);
      save();
      addMarker(place);
      renderList();
      refreshCountryColors();
      updateStats();
      map.flyTo([place.lat, place.lon], Math.max(map.getZoom(), 5), { duration: 0.8 });
    }

    // ---------- Markers ----------
    function addMarker(place) {
      const iso = (place.iso2 || "").toLowerCase();
      const ring = colorForCountry(place.iso2 || place.country || "");
      const major = MAJOR.has(place.city);
      const shadow = major
        ? "0 0 0 2px #ffd24a,0 0 9px 2px rgba(255,210,74,.55),0 1px 4px rgba(0,0,0,.5)"
        : "0 0 0 1.5px " + ring + ",0 1px 4px rgba(0,0,0,.5)";
      const html = iso
        ? '<div class="flag-pin' + (major ? " major" : "") + '" data-c="' + iso +
          '" style="background-image:url(https://flagcdn.com/w80/' + iso +
          '.png);box-shadow:' + shadow + '">' +
          (major ? '<span class="star">⭐</span>' : "") + "</div>"
        : '<div class="pin-icon"></div>';
      const size = iso ? (major ? 24 : 20) : 16;
      const half = size / 2;
      const icon = L.divIcon({
        className: "",
        html,
        iconSize: [size, size],
        iconAnchor: [half, half],
        popupAnchor: [0, -half],
      });
      const m = L.marker([place.lat, place.lon], { icon, zIndexOffset: major ? 1000 : 0 });
      const group = clusterFor(place.iso2 || "");
      m._group = group;
      group.addLayer(m);
      const flagEmoji = isoToFlag(place.iso2);
      m.bindPopup(
        "<b>" + escapeHtml(place.city) + "</b><br>" +
        (flagEmoji ? flagEmoji + " " : "") + escapeHtml(place.country || "")
      );
      markers.set(place.id, m);
    }

    function focusPlace(id) {
      const p = places.find((x) => x.id === id);
      if (!p) return;
      const m = markers.get(id);
      if (m && m._group) {
        m._group.zoomToShowLayer(m, () => m.openPopup());
      } else {
        map.flyTo([p.lat, p.lon], 6, { duration: 0.8 });
      }
    }

    function removePlace(id) {
      places = places.filter((p) => p.id !== id);
      const m = markers.get(id);
      if (m) { (m._group || map).removeLayer(m); markers.delete(id); }
      save();
      renderList();
      setTimeout(spread, 0);
      refreshCountryColors();
      updateStats();
    }

    // ---------- Sidebar render ----------
    const listEl = document.getElementById("list");

    function renderList() {
      if (!places.length) {
        listEl.innerHTML =
          '<div class="empty">Nenhum lugar ainda.<br>Busque uma cidade ou clique no mapa para começar. ✈️</div>';
        return;
      }
      const sorted = [...places].sort((a, b) =>
        (a.country || "").localeCompare(b.country || "") || a.city.localeCompare(b.city)
      );
      listEl.innerHTML = "";
      sorted.forEach((p) => {
        const el = document.createElement("div");
        el.className = "place";
        el.innerHTML =
          '<div class="flag">' + (isoToFlag(p.iso2) || "📍") + "</div>" +
          '<div class="info"><div class="city">' + escapeHtml(p.city) + "</div>" +
          '<div class="country">' + escapeHtml(p.country || "—") + "</div></div>" +
          '<button class="del" title="Remover">×</button>';
        el.addEventListener("click", (e) => {
          if (e.target.classList.contains("del")) { removePlace(p.id); return; }
          focusPlace(p.id);
        });
        listEl.appendChild(el);
      });
    }

    function updateStats() {
      document.getElementById("statCities").textContent = places.length;
      const countries = new Set(places.map((p) => p.country).filter(Boolean));
      document.getElementById("statCountries").textContent = countries.size;
    }

    document.getElementById("clearBtn").addEventListener("click", () => {
      if (!places.length) return;
      if (!confirm("Apagar todos os lugares?")) return;
      clusters.forEach((g) => g.clearLayers());
      markers.clear();
      places = [];
      save();
      renderList();
      refreshCountryColors();
      updateStats();
    });

    // ---------- Helpers ----------
    function setStatus(msg, kind) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = kind === "err" ? "status-err" : kind === "ok" ? "status-ok" : "";
    }

    function colorForCountry(key) {
      key = String(key);
      let h = 0;
      for (let i = 0; i < key.length; i++) h = (h * 31 + key.charCodeAt(i)) % 360;
      return "hsl(" + h + ", 75%, 55%)";
    }

    function isoToFlag(iso2) {
      if (!iso2 || iso2.length !== 2) return "";
      const cp = [...iso2.toUpperCase()].map((c) => 0x1f1e6 + c.charCodeAt(0) - 65);
      return String.fromCodePoint(...cp);
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
      );
    }

    function load() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }
    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(places));
    }

    function maybeSeed() {
      if (localStorage.getItem(SEED_KEY)) return; // já semeado uma vez
      SEED.forEach((s, i) => {
        const [city, country, iso2, lat, lon] = s;
        const dup = places.find((p) => p.city === city && p.country === country);
        if (dup) return;
        places.push({ id: "p_seed_" + i, city, country, iso2, lat, lon });
      });
      localStorage.setItem(SEED_KEY, "1");
      save();
    }

    // ---------- Init ----------
    places.forEach(addMarker);
    renderList();
    updateStats();
    setTimeout(spread, 250);
  })();
  </script>
</body>
</html>
